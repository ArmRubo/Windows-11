<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style2.css">
    <link rel="shortcut icon" href="./win11.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="/js/script4.js" defer></script>
    <title>Windows 11 online</title>
</head>

<body>

    <div id="action">
        <div id="keyboard" class="inAction">
            <video src="./images/Keyboard.mp4" id="keyboardvid" autoplay muted></video>

            <span class="head">Is this the right keyboard layout or <br> input method?</span>
            <span class="txt">If you also use another keyboard layout you can add that <br> next.</span>

            <div id="option">
                <div class="select active">
                    <span class="lng">English (US)</span>
                </div>

                <div class="select">
                    <span class="lng">Russian</span>
                </div>

                <div class="select">
                    <span class="lng">Armenian</span>
                </div>

            </div>

            <button id="yes">Yes</button>
        </div>

        <div id="updates" class="inAction">
            <img src="./images/Update.png" alt="updates">
            <img src="./images/loadingsetup.gif" id="vdLoad">
            <div class="spans">
                <span id="txt1" class="txt">Cheking for updates.</span>
                <span id="txt2" class="txt">Making sure you have the latest.</span>
                <span id="txt3" class="txt">Good things coming your way.</span>
            </div>
        </div>
    </div>

</body>

</html>
